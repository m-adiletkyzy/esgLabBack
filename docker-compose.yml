services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

  web:
    build:
      context: ./ESGBack
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./ESGBack:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  celery_worker:
    build:
      context: ./ESGBack
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./ESGBack:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A ESGBack worker -l info --pool=solo

  celery_beat:
    build:
      context: ./ESGBack
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./ESGBack:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: celery -A ESGBack beat -l info

volumes:
  postgres_data:
  redis_data:
